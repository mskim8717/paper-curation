name: schema-drift

# Catches accidental schema regressions in `_papers_index.json`:
#  - Required fields present (slug, title, classifications, has_pdf)
#  - new Phase 1 integrity fields preserved (text_md_sha256, doi_verified, zotero_item_key)
#  - No malformed entries (NaN, missing classifications[topic])

on:
  push:
    branches: [master]
    paths:
      - 'docs/papers/_papers_index.json'
      - 'pipeline/build_papers_index.py'
      - 'pipeline/classify_papers.py'
      - '.github/workflows/schema-drift.yml'
  pull_request:
    paths:
      - 'docs/papers/_papers_index.json'
      - 'pipeline/build_papers_index.py'
      - 'pipeline/classify_papers.py'
  workflow_dispatch:

jobs:
  drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Schema sanity
        run: |
          python - <<'PY'
          import json, sys
          REQ = {"slug", "title", "classifications", "has_pdf", "topics"}
          PHASE1 = {"text_md_sha256", "doi_verified", "zotero_item_key"}
          path = "docs/papers/_papers_index.json"
          try:
              data = json.load(open(path, encoding="utf-8"))
          except FileNotFoundError:
              print(f"::notice::{path} missing — skipping (likely topic-only branch)")
              sys.exit(0)
          if not isinstance(data, list):
              print(f"::error::{path} is not a list")
              sys.exit(1)
          missing_req, missing_phase1 = 0, 0
          for i, p in enumerate(data):
              miss = REQ - set(p.keys())
              if miss:
                  if missing_req < 5:
                      print(f"::error::entry {i} {p.get('slug','?')} missing {miss}")
                  missing_req += 1
              # Phase 1 fields are warnings (older entries may not have them yet)
              ph1 = PHASE1 - set(p.keys())
              if ph1:
                  missing_phase1 += 1
          print(f"entries: {len(data)}  missing-required: {missing_req}  missing-phase1: {missing_phase1}")
          if missing_req:
              print(f"::error::{missing_req} entries violate required schema")
              sys.exit(1)
          if missing_phase1 > len(data) * 0.5:
              print(f"::warning::{missing_phase1}/{len(data)} entries missing Phase 1 integrity fields")
          PY
