#:schema node_modules/wrangler/config-schema.json
# Cloudflare Workers with Static Assets + /api/audio-email function.
# Serves docs/ as a static site, but routes POST /api/audio-email to the
# Worker script which forwards the MP3 to Resend.
# Docs: https://developers.cloudflare.com/workers/static-assets/binding/

name = "paper-curation"
compatibility_date = "2026-04-11"
main = "./worker/index.js"

[assets]
directory = "./docs"
binding = "ASSETS"

# Custom domain. Configured once in the dashboard (Workers > paper-curation >
# Settings > Domains & Routes > Add Custom Domain) and mirrored here so
# wrangler deploys preserve it. `custom_domain = true` makes Cloudflare
# manage the AAAA record + SSL cert automatically; `zone_name` must be the
# parent zone you own in this account.
[[routes]]
pattern = "paper-curation.jehyunlee.dev"
custom_domain = true
zone_name = "jehyunlee.dev"

# Secrets (set with `npx wrangler secret put <NAME>`):
#   RESEND_API_KEY   — Resend API key (re_xxx). Required for /api/audio-email.
#   AUDIO_REPLY_TO   — Optional. Reply-To header on outgoing mail
#                       (e.g. "jehyun.lee@gmail.com"). If unset, no Reply-To.
#   AUDIO_FROM       — Optional. Override "From:" address. Defaults to
#                       "Paper Curation <onboarding@resend.dev>".
